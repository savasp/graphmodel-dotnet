  test-neo4j:
    name: Test Neo4j Provider
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.dotnet == 'true' || needs.changes.outputs.ci_workflow == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 20
    permissions:
      checks: write
      contents: read

    services:
      neo4j:
        image: neo4j:5
        ports:
          - 7687:7687
          - 7474:7474
        env:
          NEO4J_AUTH: neo4j/password
          NEO4J_PLUGINS: '["apoc"]'
          NEO4J_dbms_security_procedures_unrestricted: apoc.*
          NEO4J_dbms_security_procedures_allowlist: apoc.*
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: |
            **/*.csproj
            global.json

      - name: Wait for Neo4j
        shell: bash
        run: |
          timeout 300 bash -c 'until curl --fail --silent http://localhost:7474 >/dev/null; do sleep 5; done'

      - name: Restore dependencies
        run: dotnet restore

      - name: Set up local feed
        run: dotnet build --configuration LocalFeed --no-restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test Neo4j Provider
        run: >
          dotnet test
          --project tests/Graph.Neo4j.Tests/Graph.Neo4j.Tests.csproj
          --no-build
          --configuration Release
          --verbosity normal
          --results-directory TestResults/test-neo4j
          --coverage
          --coverage-output test-neo4j.cobertura.xml
          --coverage-output-format cobertura
          --report-xunit-trx
          --report-xunit-trx-filename test-neo4j.trx
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: password
          USE_NEO4J_CONTAINERS: false

      - name: Upload Neo4j Provider results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: test-neo4j-results
          path: TestResults/test-neo4j/
          retention-days: 14

      - name: Publish Neo4j Provider results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3
        if: ${{ always() && hashFiles('TestResults/test-neo4j/*.trx') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        with:
          name: Test Neo4j Provider
          path: TestResults/test-neo4j/*.trx
          reporter: dotnet-trx

      - name: Upload Neo4j Provider coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        if: success()
        with:
          files: TestResults/test-neo4j/test-neo4j.cobertura.xml
