      - name: Test Apache AGE Provider (strict compliance)
        env:
          AGE_CONNECTION_STRING: Host=localhost;Port=5432;Username=postgres;Password=postgres;Database=postgres
          GRAPHMODEL_COMPLIANCE_STRICT: "1"
        run: >
          dotnet test
          --project tests/Graph.Age.Tests/Graph.Age.Tests.csproj
          --no-build
          --configuration Release
          --verbosity normal
          --results-directory TestResults/test-age
