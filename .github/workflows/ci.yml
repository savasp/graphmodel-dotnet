name: CI

on:
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  ContinuousIntegrationBuild: true
  SourceRevisionId: ${{ github.sha }}

jobs:
  changes:
    name: Resolve validation scope
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      dotnet: ${{ steps.filter.outputs.dotnet }}
      workflow_files: ${{ steps.filter.outputs.workflow_files }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        id: filter
        with:
          filters: |
            dotnet:
              - '**/*.cs'
              - '**/*.csproj'
              - '**/*.sln'
              - '.editorconfig'
              - '**/*.props'
              - '**/*.targets'
              - '**/*.resx'
              - '**/appsettings*.json'
              - 'src/Graph.Analyzers/AnalyzerReleases.*.md'
              - 'scripts/containers/start-neo4j.sh'
              - 'scripts/containers/start-age.sh'
              - 'global.json'
              - '.config/dotnet-tools.json'
              - 'VERSION'
              - 'VERSION.ASSEMBLY'
              - '.github/workflows/ci.yml'
            workflow_files:
              - '.github/workflows/**'

      - name: Parse workflow YAML files
        if: steps.filter.outputs.workflow_files == 'true' || github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          ruby -e '
            require "yaml"

            paths = Dir[".github/workflows/*.yml"] + Dir[".github/workflows/*.yaml"]
            paths.sort.each do |path|
              YAML.load_file(path)
              puts "ok #{path}"
            rescue Psych::SyntaxError => e
              warn "::error file=#{path},line=#{e.line},col=#{e.column}::#{e.message}"
              exit 1
            end
          '

      - name: Audit workflow security
        if: steps.filter.outputs.workflow_files == 'true' || github.event_name == 'workflow_dispatch'
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          version: 1.26.1
          inputs: .github/workflows
          persona: regular
          advanced-security: false
          annotations: true

  validation:
    name: Build, format, and test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.dotnet == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 30
    permissions:
      checks: write
      contents: read

    services:
      neo4j:
        image: neo4j:5
        ports:
          - 7687:7687
          - 7474:7474
        env:
          NEO4J_AUTH: neo4j/password
          NEO4J_PLUGINS: '["apoc"]'
          NEO4J_dbms_security_procedures_unrestricted: apoc.*
          NEO4J_dbms_security_procedures_allowlist: apoc.*
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30
      age:
        image: apache/age:release_PG18_1.7.0
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: |
            **/*.csproj
            global.json

      - name: Restore dependencies
        run: dotnet restore

      - name: Set up and verify the local package feed
        run: |
          dotnet build --configuration LocalFeed --no-restore
          ./scripts/verify-package-set.sh ./local-nuget-feed
          dotnet build examples/SimpleMovieExample/SimpleMovieExample.csproj --configuration Release

      - name: Build once for every test suite
        run: dotnet build --no-restore --configuration Release

      - name: Verify formatting
        run: dotnet format --verify-no-changes --no-restore --verbosity normal

      - name: Run every test suite
        id: tests
        shell: bash
        env:
          AGE_CONNECTION_STRING: Host=localhost;Port=5432;Username=postgres;Password=postgres;Database=postgres
          NEO4J_PASSWORD: password
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          USE_NEO4J_CONTAINERS: "false"
        run: |
          set +e
          status=0

          run_covered() {
            local slug="$1"
            local project="$2"
            echo "=== test: $slug ==="
            dotnet test \
              --project "$project" \
              --no-build \
              --configuration Release \
              --verbosity normal \
              --results-directory "TestResults/$slug" \
              --coverage \
              --coverage-output "$slug.cobertura.xml" \
              --coverage-output-format cobertura \
              --report-xunit-trx \
              --report-xunit-trx-filename "$slug.trx" || status=1
          }

          run_covered test-core tests/Graph.CompatibilityTests.Tests/Graph.CompatibilityTests.Tests.csproj
          dotnet test --project tests/Graph.Core.Tests/Graph.Core.Tests.csproj \
            --no-build --configuration Release --verbosity normal || status=1
          run_covered test-cypher tests/Graph.Cypher.Tests/Graph.Cypher.Tests.csproj
          run_covered test-analyzers tests/Graph.Analyzers.Tests/Graph.Analyzers.Tests.csproj
          run_covered test-translation tests/Graph.Neo4j.Translation.Tests/Graph.Neo4j.Translation.Tests.csproj
          run_covered test-query-surface tests/Graph.QuerySurface.CompilationTests/Graph.QuerySurface.CompilationTests.csproj
          run_covered test-codegen tests/Graph.Serialization.CodeGen.Tests/Graph.Serialization.CodeGen.Tests.csproj
          export GRAPHMODEL_COMPLIANCE_STRICT=1
          run_covered test-neo4j tests/Graph.Neo4j.Tests/Graph.Neo4j.Tests.csproj
          run_covered test-inmemory tests/Graph.InMemory.Tests/Graph.InMemory.Tests.csproj
          run_covered test-age tests/Graph.Age.Tests/Graph.Age.Tests.csproj

          exit "$status"

      - name: Upload test results and coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: test-results
          path: TestResults/
          retention-days: 14

      - name: Publish test results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3
        if: ${{ always() && hashFiles('TestResults/**/*.trx') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        with:
          name: Graph tests
          path: TestResults/**/*.trx
          reporter: dotnet-trx

      - name: Upload coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        if: steps.tests.outcome == 'success'
        with:
          directory: TestResults
          flags: tests
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  required-checks:
    name: Required checks
    runs-on: ubuntu-latest
    needs: [changes, validation]
    if: ${{ always() }}
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Verify required jobs passed or were intentionally skipped
        shell: bash
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          VALIDATION_RESULT: ${{ needs.validation.result }}
        run: |
          echo "changes=$CHANGES_RESULT"
          echo "validation=$VALIDATION_RESULT"

          [[ "$CHANGES_RESULT" == "success" ]] || {
            echo "::error::validation scope or workflow audit failed"
            exit 1
          }
          [[ "$VALIDATION_RESULT" == "success" || "$VALIDATION_RESULT" == "skipped" ]] || {
            echo "::error::build, format, or tests failed"
            exit 1
          }
