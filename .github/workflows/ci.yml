name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: read
    outputs:
      dotnet: ${{ steps.filter.outputs.dotnet }}
      ci_workflow: ${{ steps.filter.outputs.ci_workflow }}
      workflow_files: ${{ steps.filter.outputs.workflow_files }}

    steps:
      - uses: actions/checkout@v7

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            dotnet:
              - '**/*.cs'
              - '**/*.csproj'
              - '**/*.sln'
              - '**/*.props'
              - '**/*.targets'
              - '**/*.resx'
              - '**/appsettings*.json'
              - 'src/Graph.Model.Analyzers/AnalyzerReleases.*.md'
              - 'scripts/containers/start-neo4j.sh'
              - 'global.json'
              - '.config/dotnet-tools.json'
              - 'VERSION'
              - 'VERSION.ASSEMBLY'
            ci_workflow:
              # Editing ci.yml can alter any required job below, so fan out
              # the full CI suite on CI workflow changes.
              - '.github/workflows/ci.yml'
            workflow_files:
              # Non-CI workflow edits only need the lightweight YAML guard.
              - '.github/workflows/**'

  workflow-yaml:
    name: Workflow YAML syntax
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.workflow_files == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 2
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Parse workflow YAML files
        shell: bash
        run: |
          ruby -e '
            require "yaml"

            paths = Dir[".github/workflows/*.yml"] + Dir[".github/workflows/*.yaml"]
            paths.sort.each do |path|
              YAML.load_file(path)
              puts "ok #{path}"
            rescue Psych::SyntaxError => e
              warn "::error file=#{path},line=#{e.line},col=#{e.column}::#{e.message}"
              exit 1
            end
          '

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.dotnet == 'true' || needs.changes.outputs.ci_workflow == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: |
            **/*.csproj
            global.json

      - name: Restore dependencies
        run: dotnet restore

      - name: Set up local feed
        run: dotnet build --configuration LocalFeed --no-restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

  test-core:
    name: Test Core
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.dotnet == 'true' || needs.changes.outputs.ci_workflow == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 15
    permissions:
      checks: write
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: |
            **/*.csproj
            global.json

      - name: Restore dependencies
        run: dotnet restore

      - name: Set up local feed
        run: dotnet build --configuration LocalFeed --no-restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test Core
        run: >
          dotnet test
          --project tests/Graph.Model.Tests/Graph.Model.Tests.csproj
          --no-build
          --configuration Release
          --verbosity normal
          --results-directory TestResults/test-core
          --coverage
          --coverage-output test-core.cobertura.xml
          --coverage-output-format cobertura
          --report-xunit-trx
          --report-xunit-trx-filename test-core.trx

      - name: Upload Test Core results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-core-results
          path: TestResults/test-core/
          retention-days: 14

      - name: Publish Test Core results
        uses: dorny/test-reporter@v3
        if: ${{ always() && hashFiles('TestResults/test-core/*.trx') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        with:
          name: Test Core
          path: TestResults/test-core/*.trx
          reporter: dotnet-trx

      - name: Upload Test Core coverage
        uses: codecov/codecov-action@v7
        if: success()
        with:
          files: TestResults/test-core/test-core.cobertura.xml
          flags: test-core
          name: test-core
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  test-analyzers:
    name: Test Analyzers
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.dotnet == 'true' || needs.changes.outputs.ci_workflow == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 15
    permissions:
      checks: write
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: |
            **/*.csproj
            global.json

      - name: Restore dependencies
        run: dotnet restore

      - name: Set up local feed
        run: dotnet build --configuration LocalFeed --no-restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test Analyzers
        run: >
          dotnet test
          --project tests/Graph.Model.Analyzers.Tests/Graph.Model.Analyzers.Tests.csproj
          --no-build
          --configuration Release
          --verbosity normal
          --results-directory TestResults/test-analyzers
          --coverage
          --coverage-output test-analyzers.cobertura.xml
          --coverage-output-format cobertura
          --report-xunit-trx
          --report-xunit-trx-filename test-analyzers.trx

      - name: Upload Test Analyzers results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-analyzers-results
          path: TestResults/test-analyzers/
          retention-days: 14

      - name: Publish Test Analyzers results
        uses: dorny/test-reporter@v3
        if: ${{ always() && hashFiles('TestResults/test-analyzers/*.trx') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        with:
          name: Test Analyzers
          path: TestResults/test-analyzers/*.trx
          reporter: dotnet-trx

      - name: Upload Test Analyzers coverage
        uses: codecov/codecov-action@v7
        if: success()
        with:
          files: TestResults/test-analyzers/test-analyzers.cobertura.xml
          flags: test-analyzers
          name: test-analyzers
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  test-translation:
    name: Test LINQ-to-Cypher translation
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.dotnet == 'true' || needs.changes.outputs.ci_workflow == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 15
    permissions:
      checks: write
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: |
            **/*.csproj
            global.json

      - name: Restore dependencies
        run: dotnet restore

      - name: Set up local feed
        run: dotnet build --configuration LocalFeed --no-restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test LINQ-to-Cypher translation (no Neo4j required)
        run: >
          dotnet test
          --project tests/Graph.Model.Neo4j.Translation.Tests/Graph.Model.Neo4j.Translation.Tests.csproj
          --no-build
          --configuration Release
          --verbosity normal
          --results-directory TestResults/test-translation
          --coverage
          --coverage-output test-translation.cobertura.xml
          --coverage-output-format cobertura
          --report-xunit-trx
          --report-xunit-trx-filename test-translation.trx

      - name: Upload LINQ-to-Cypher translation results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-translation-results
          path: TestResults/test-translation/
          retention-days: 14

      - name: Publish LINQ-to-Cypher translation results
        uses: dorny/test-reporter@v3
        if: ${{ always() && hashFiles('TestResults/test-translation/*.trx') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        with:
          name: Test LINQ-to-Cypher translation
          path: TestResults/test-translation/*.trx
          reporter: dotnet-trx

      - name: Upload LINQ-to-Cypher translation coverage
        uses: codecov/codecov-action@v7
        if: success()
        with:
          files: TestResults/test-translation/test-translation.cobertura.xml
          flags: test-translation
          name: test-translation
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  test-codegen:
    name: Test serialization code generator
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.dotnet == 'true' || needs.changes.outputs.ci_workflow == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 15
    permissions:
      checks: write
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: |
            **/*.csproj
            global.json

      - name: Restore dependencies
        run: dotnet restore

      - name: Set up local feed
        run: dotnet build --configuration LocalFeed --no-restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test serialization code generator (no Neo4j required)
        run: >
          dotnet test
          --project tests/Graph.Model.Serialization.CodeGen.Tests/Graph.Model.Serialization.CodeGen.Tests.csproj
          --no-build
          --configuration Release
          --verbosity normal
          --results-directory TestResults/test-codegen
          --coverage
          --coverage-output test-codegen.cobertura.xml
          --coverage-output-format cobertura
          --report-xunit-trx
          --report-xunit-trx-filename test-codegen.trx

      - name: Upload serialization code generator results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-codegen-results
          path: TestResults/test-codegen/
          retention-days: 14

      - name: Publish serialization code generator results
        uses: dorny/test-reporter@v3
        if: ${{ always() && hashFiles('TestResults/test-codegen/*.trx') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        with:
          name: Test serialization code generator
          path: TestResults/test-codegen/*.trx
          reporter: dotnet-trx

      - name: Upload serialization code generator coverage
        uses: codecov/codecov-action@v7
        if: success()
        with:
          files: TestResults/test-codegen/test-codegen.cobertura.xml
          flags: test-codegen
          name: test-codegen
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  test-neo4j:
    name: Test Neo4j Provider
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.dotnet == 'true' || needs.changes.outputs.ci_workflow == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 20
    permissions:
      checks: write
      contents: read

    services:
      neo4j:
        image: neo4j:5-enterprise
        ports:
          - 7687:7687
          - 7474:7474
        env:
          NEO4J_AUTH: neo4j/password
          NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
          NEO4J_PLUGINS: '["apoc"]'
          NEO4J_dbms_security_procedures_unrestricted: apoc.*
          NEO4J_dbms_security_procedures_allowlist: apoc.*
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: |
            **/*.csproj
            global.json

      - name: Wait for Neo4j
        shell: bash
        run: |
          timeout 300 bash -c 'until curl --fail --silent http://localhost:7474 >/dev/null; do sleep 5; done'

      - name: Restore dependencies
        run: dotnet restore

      - name: Set up local feed
        run: dotnet build --configuration LocalFeed --no-restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test Neo4j Provider
        run: >
          dotnet test
          --project tests/Graph.Model.Neo4j.Tests/Graph.Model.Neo4j.Tests.csproj
          --no-build
          --configuration Release
          --verbosity normal
          --results-directory TestResults/test-neo4j
          --coverage
          --coverage-output test-neo4j.cobertura.xml
          --coverage-output-format cobertura
          --report-xunit-trx
          --report-xunit-trx-filename test-neo4j.trx
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: password
          USE_NEO4J_CONTAINERS: false

      - name: Upload Neo4j Provider results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-neo4j-results
          path: TestResults/test-neo4j/
          retention-days: 14

      - name: Publish Neo4j Provider results
        uses: dorny/test-reporter@v3
        if: ${{ always() && hashFiles('TestResults/test-neo4j/*.trx') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        with:
          name: Test Neo4j Provider
          path: TestResults/test-neo4j/*.trx
          reporter: dotnet-trx

      - name: Upload Neo4j Provider coverage
        uses: codecov/codecov-action@v7
        if: success()
        with:
          files: TestResults/test-neo4j/test-neo4j.cobertura.xml
          flags: test-neo4j
          name: test-neo4j
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  required-checks:
    name: Required checks
    runs-on: ubuntu-latest
    needs:
      - changes
      - workflow-yaml
      - build
      - test-core
      - test-analyzers
      - test-translation
      - test-codegen
      - test-neo4j
    # Always runs - branch protection depends on a single "Required checks"
    # context, so this job must report a status regardless of which
    # individual jobs above passed, failed, were skipped, or were cancelled.
    if: ${{ always() }}
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Verify all required jobs passed or were skipped
        shell: bash
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          WORKFLOW_YAML_RESULT: ${{ needs.workflow-yaml.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          TEST_CORE_RESULT: ${{ needs.test-core.result }}
          TEST_ANALYZERS_RESULT: ${{ needs.test-analyzers.result }}
          TEST_TRANSLATION_RESULT: ${{ needs.test-translation.result }}
          TEST_CODEGEN_RESULT: ${{ needs.test-codegen.result }}
          TEST_NEO4J_RESULT: ${{ needs.test-neo4j.result }}
        run: |
          echo "changes=$CHANGES_RESULT"
          echo "workflow-yaml=$WORKFLOW_YAML_RESULT"
          echo "build=$BUILD_RESULT"
          echo "test-core=$TEST_CORE_RESULT"
          echo "test-analyzers=$TEST_ANALYZERS_RESULT"
          echo "test-translation=$TEST_TRANSLATION_RESULT"
          echo "test-codegen=$TEST_CODEGEN_RESULT"
          echo "test-neo4j=$TEST_NEO4J_RESULT"

          if [[ "$CHANGES_RESULT" != "success" ]]; then
            echo "::error::changes detection job failed"
            exit 1
          fi

          ok() { [[ "$1" == "success" || "$1" == "skipped" ]]; }

          ok "$WORKFLOW_YAML_RESULT"    || { echo "::error::workflow-yaml failed"; exit 1; }
          ok "$BUILD_RESULT"            || { echo "::error::build failed"; exit 1; }
          ok "$TEST_CORE_RESULT"        || { echo "::error::test-core failed"; exit 1; }
          ok "$TEST_ANALYZERS_RESULT"   || { echo "::error::test-analyzers failed"; exit 1; }
          ok "$TEST_TRANSLATION_RESULT" || { echo "::error::test-translation failed"; exit 1; }
          ok "$TEST_CODEGEN_RESULT"     || { echo "::error::test-codegen failed"; exit 1; }
          ok "$TEST_NEO4J_RESULT"       || { echo "::error::test-neo4j failed"; exit 1; }
