          --coverage-output test-age.cobertura.xml
          --coverage-output-format cobertura
          --report-xunit-trx
          --report-xunit-trx-filename test-age.trx

      - name: Upload Apache AGE Provider results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: test-age-results
          path: TestResults/test-age/
          retention-days: 14

      - name: Publish Apache AGE Provider results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3
        if: ${{ always() && hashFiles('TestResults/test-age/*.trx') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        with:
          name: Test Apache AGE Provider
          path: TestResults/test-age/*.trx
          reporter: dotnet-trx

      - name: Upload Apache AGE Provider coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        if: success()
        with:
          files: TestResults/test-age/test-age.cobertura.xml
          flags: test-age
          name: test-age
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  required-checks:
    name: Required checks
    runs-on: ubuntu-latest
    needs:
      - changes
      - workflow-yaml
      - build
      - format
      - test-core
      - test-analyzers
      - test-translation
      - test-codegen
      - test-neo4j
      - test-inmemory
      - test-age
    # Always runs - branch protection depends on a single "Required checks"
    # context, so this job must report a status regardless of which
    # individual jobs above passed, failed, were skipped, or were cancelled.
    if: ${{ always() }}
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Verify all required jobs passed or were skipped
        shell: bash
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          WORKFLOW_YAML_RESULT: ${{ needs.workflow-yaml.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          FORMAT_RESULT: ${{ needs.format.result }}
          TEST_CORE_RESULT: ${{ needs.test-core.result }}
          TEST_ANALYZERS_RESULT: ${{ needs.test-analyzers.result }}
          TEST_TRANSLATION_RESULT: ${{ needs.test-translation.result }}
          TEST_CODEGEN_RESULT: ${{ needs.test-codegen.result }}
          TEST_NEO4J_RESULT: ${{ needs.test-neo4j.result }}
          TEST_INMEMORY_RESULT: ${{ needs.test-inmemory.result }}
          TEST_AGE_RESULT: ${{ needs.test-age.result }}
        run: |
          echo "changes=$CHANGES_RESULT"
          echo "workflow-yaml=$WORKFLOW_YAML_RESULT"
          echo "build=$BUILD_RESULT"
          echo "format=$FORMAT_RESULT"
          echo "test-core=$TEST_CORE_RESULT"
          echo "test-analyzers=$TEST_ANALYZERS_RESULT"
          echo "test-translation=$TEST_TRANSLATION_RESULT"
          echo "test-codegen=$TEST_CODEGEN_RESULT"
          echo "test-neo4j=$TEST_NEO4J_RESULT"
          echo "test-inmemory=$TEST_INMEMORY_RESULT"
          echo "test-age=$TEST_AGE_RESULT"

          if [[ "$CHANGES_RESULT" != "success" ]]; then
            echo "::error::changes detection job failed"
            exit 1
          fi

          ok() { [[ "$1" == "success" || "$1" == "skipped" ]]; }

          ok "$WORKFLOW_YAML_RESULT"    || { echo "::error::workflow-yaml failed"; exit 1; }
          ok "$BUILD_RESULT"            || { echo "::error::build failed"; exit 1; }
          ok "$FORMAT_RESULT"           || { echo "::error::format failed"; exit 1; }
          ok "$TEST_CORE_RESULT"        || { echo "::error::test-core failed"; exit 1; }
          ok "$TEST_ANALYZERS_RESULT"   || { echo "::error::test-analyzers failed"; exit 1; }
          ok "$TEST_TRANSLATION_RESULT" || { echo "::error::test-translation failed"; exit 1; }
          ok "$TEST_CODEGEN_RESULT"     || { echo "::error::test-codegen failed"; exit 1; }
          ok "$TEST_NEO4J_RESULT"       || { echo "::error::test-neo4j failed"; exit 1; }
          ok "$TEST_INMEMORY_RESULT"    || { echo "::error::test-inmemory failed"; exit 1; }
          ok "$TEST_AGE_RESULT"         || { echo "::error::test-age failed"; exit 1; }
