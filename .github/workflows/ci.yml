  test-age:
    name: Test Apache AGE Provider
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.dotnet == 'true' || needs.changes.outputs.ci_workflow == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 20
    permissions:
      checks: write
