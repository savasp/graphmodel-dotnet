name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  ContinuousIntegrationBuild: true
  SourceRevisionId: ${{ github.sha }}

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: read
    outputs:
      dotnet: ${{ steps.filter.outputs.dotnet }}
      ci_workflow: ${{ steps.filter.outputs.ci_workflow }}
      workflow_files: ${{ steps.filter.outputs.workflow_files }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        id: filter
        with:
          filters: |
            dotnet:
              - '**/*.cs'
              - '**/*.csproj'
              - '**/*.sln'
              - '.editorconfig'
              - '**/*.props'
              - '**/*.targets'
              - '**/*.resx'
              - '**/appsettings*.json'
              - 'src/Graph.Analyzers/AnalyzerReleases.*.md'
              - 'scripts/containers/start-neo4j.sh'
              - 'scripts/containers/start-age.sh'
              - 'global.json'
              - '.config/dotnet-tools.json'
              - 'VERSION'
              - 'VERSION.ASSEMBLY'
            ci_workflow:
              # Editing ci.yml can alter any required job below, so fan out
              # the full CI suite on CI workflow changes.
              - '.github/workflows/ci.yml'
            workflow_files:
              # Non-CI workflow edits only need the lightweight YAML guard.
              - '.github/workflows/**'

  workflow-yaml:
    name: Workflow YAML syntax
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.workflow_files == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 2
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Parse workflow YAML files
        shell: bash
        run: |
          ruby -e '
            require "yaml"

            paths = Dir[".github/workflows/*.yml"] + Dir[".github/workflows/*.yaml"]
            paths.sort.each do |path|
              YAML.load_file(path)
              puts "ok #{path}"
            rescue Psych::SyntaxError => e
              warn "::error file=#{path},line=#{e.line},col=#{e.column}::#{e.message}"
              exit 1
            end
          '

      - name: Audit workflow security
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          version: 1.26.1
          inputs: .github/workflows
          persona: regular
          advanced-security: false
          annotations: true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.dotnet == 'true' || needs.changes.outputs.ci_workflow == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: |
            **/*.csproj
            global.json

      - name: Restore dependencies
        run: dotnet restore

      - name: Set up local feed
        run: dotnet build --configuration LocalFeed --no-restore

      - name: Verify local feed package set
        run: ./scripts/verify-package-set.sh ./local-nuget-feed

      - name: Build consumer example against local feed
        run: dotnet build examples/SimpleMovieExample/SimpleMovieExample.csproj --configuration Release

      - name: Build
        run: dotnet build --no-restore --configuration Release

  format:
    name: Format
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.dotnet == 'true' || needs.changes.outputs.ci_workflow == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: |
            **/*.csproj
            Directory.Packages.props

      - name: Restore dependencies
        run: dotnet restore

      - name: Verify formatting
        run: dotnet format --verify-no-changes --no-restore --verbosity normal

  test-core:
    name: Test Core
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.dotnet == 'true' || needs.changes.outputs.ci_workflow == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 15
    permissions:
      checks: write
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: |
            **/*.csproj
            global.json

      - name: Restore dependencies
        run: dotnet restore

      - name: Set up local feed
        run: dotnet build --configuration LocalFeed --no-restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test Core
        run: >
          dotnet test
          --project tests/Graph.CompatibilityTests.Tests/Graph.CompatibilityTests.Tests.csproj
          --no-build
          --configuration Release
          --verbosity normal
          --results-directory TestResults/test-core
          --coverage
          --coverage-output test-core.cobertura.xml
          --coverage-output-format cobertura
          --report-xunit-trx
          --report-xunit-trx-filename test-core.trx

      - name: Upload Test Core results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: test-core-results
          path: TestResults/test-core/
          retention-days: 14

      - name: Publish Test Core results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3
        if: ${{ always() && hashFiles('TestResults/test-core/*.trx') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        with:
          name: Test Core
          path: TestResults/test-core/*.trx
          reporter: dotnet-trx

      - name: Upload Test Core coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        if: success()
        with:
          files: TestResults/test-core/test-core.cobertura.xml
          flags: test-core
          name: test-core
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Test Core Libraries
        run: dotnet test --project tests/Graph.Core.Tests/Graph.Core.Tests.csproj --no-build --configuration Release --verbosity normal

  test-analyzers:
    name: Test Analyzers
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.dotnet == 'true' || needs.changes.outputs.ci_workflow == 'true' || github.event_name == 'workflow_dispatch'
