name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    name: Review Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Checkout
      uses: actions/checkout@v7

    - name: Dependency Review
      uses: actions/dependency-review-action@v5
      with:
        fail-on-severity: high
        deny-licenses: GPL-2.0, GPL-3.0
