name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Start Neo4j
      run: scripts/containers/start-neo4j.sh

    - name: Restore dependencies
      run: dotnet restore
    
    - name: Set up local feed
      run: dotnet build --configuration LocalFeed --no-restore

    - name: Build
      run: dotnet build --no-restore --configuration Release
    
    - name: Test Core
      run: dotnet test --project tests/Graph.Model.Tests/Graph.Model.Tests.csproj --no-build --configuration Release --verbosity normal

    - name: Test Analyzers
      run: dotnet test --project tests/Graph.Model.Analyzers.Tests/Graph.Model.Analyzers.Tests.csproj --no-build --configuration Release --verbosity normal

    - name: Test LINQ-to-Cypher translation (no Neo4j required)
      run: dotnet test --project tests/Graph.Model.Neo4j.Translation.Tests/Graph.Model.Neo4j.Translation.Tests.csproj --no-build --configuration Release --verbosity normal

    - name: Test serialization code generator (no Neo4j required)
      run: dotnet test --project tests/Graph.Model.Serialization.CodeGen.Tests/Graph.Model.Serialization.CodeGen.Tests.csproj --no-build --configuration Release --verbosity normal

    - name: Test Neo4j Provider
      run: dotnet test --project tests/Graph.Model.Neo4j.Tests/Graph.Model.Neo4j.Tests.csproj --no-build --configuration Release --verbosity normal
