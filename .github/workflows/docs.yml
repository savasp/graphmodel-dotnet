name: 📚 Documentation

on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'docs/**'
      - 'scripts/build-docs.*'
      - '.config/dotnet-tools.json'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'docs/**'
      - 'scripts/build-docs.*'
      - '.config/dotnet-tools.json'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

jobs:
  # Validates the DocFX API reference build on every push/PR. This does not deploy anything; it only
  # proves the site still generates cleanly with zero warnings (DocFX surfaces malformed/missing XML
  # doc comments on the public API surface as warnings, which we treat as build failures here).
  validate-api-reference:
    name: 🔍 Validate API Reference
    runs-on: ubuntu-latest

    steps:
    - name: 📦 Checkout
      uses: actions/checkout@v7

    - name: ⚙️ Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: 🗂️ Cache Dependencies
      uses: actions/cache@v6
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: 📋 Restore Dependencies
      run: dotnet restore

    - name: 🛠️ Restore DocFX Tool
      run: dotnet tool restore

    - name: 📖 Build API Reference Site (validation only)
      run: dotnet docfx docs/apiref/docfx.json --warningsAsErrors

  # Builds the Jekyll conceptual-docs site (owning the root of Pages) and the DocFX API reference
  # (published under /api/), assembles both into a single Pages artifact, and deploys it.
  deploy-docs:
    name: 🚀 Deploy Documentation
    runs-on: ubuntu-latest
    needs: validate-api-reference
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
    - name: 📦 Checkout
      uses: actions/checkout@v7

    - name: ⚙️ Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: 🗂️ Cache Dependencies
      uses: actions/cache@v6
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: 📋 Restore Dependencies
      run: dotnet restore

    - name: 🛠️ Restore DocFX Tool
      run: dotnet tool restore

    - name: 📖 Build API Reference Site
      run: dotnet docfx docs/apiref/docfx.json --warningsAsErrors

    - name: 🏗️ Setup Ruby (for Jekyll)
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'
        bundler-cache: true

    - name: 🧭 Configure Pages
      uses: actions/configure-pages@v6

    - name: 📦 Install Jekyll Dependencies
      run: |
        echo "📦 Using repository Gemfile for Jekyll dependencies..."
        echo "Gemfile contents:"
        cat Gemfile
        bundle install

    - name: 🏗️ Build Jekyll Site
      run: |
        echo "🏗️ Building Jekyll site..."
        bundle exec jekyll build --destination _site

        echo "📋 Jekyll build completed. Contents:"
        ls -la _site/

    # DocFX owns /api/ under the Pages site; Jekyll owns everything else. Jekyll builds first (into
    # _site/), then the already-built DocFX output (docs/apiref/_site/) is copied into _site/api/ so a
    # single upload-pages-artifact step publishes both.
    - name: 🔗 Merge API Reference into Pages Site
      run: |
        echo "🔗 Copying DocFX output into _site/api/..."
        mkdir -p _site/api
        cp -r docs/apiref/_site/. _site/api/
        ls -la _site/api/

    - name: 📤 Upload Documentation Site
      uses: actions/upload-pages-artifact@v5
      with:
        path: _site

    - name: 🚀 Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5
