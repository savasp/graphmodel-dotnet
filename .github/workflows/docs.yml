name: 📚 Documentation

on:
  push:
    branches: [ "main" ]
    paths:
      - '_config.yml'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'CODE_OF_CONDUCT.md'
      - 'Directory.Packages.props'
      - 'Gemfile'
      - 'Gemfile.lock'
      - 'README.md'
      - 'global.json'
      - 'index.md'
      - 'src/**'
      - 'docs/**'
      - 'scripts/build-docs.*'
      - '.config/dotnet-tools.json'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - '_config.yml'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'CODE_OF_CONDUCT.md'
      - 'Directory.Packages.props'
      - 'Gemfile'
      - 'Gemfile.lock'
      - 'README.md'
      - 'global.json'
      - 'index.md'
      - 'src/**'
      - 'docs/**'
      - 'scripts/build-docs.*'
      - '.config/dotnet-tools.json'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Validates the DocFX API reference build on every push/PR. This does not deploy anything; it only
  # proves the site still generates cleanly with zero warnings (DocFX surfaces malformed/missing XML
  # doc comments on the public API surface as warnings, which we treat as build failures here).
  validate-api-reference:
    name: 🔍 Validate API Reference
    runs-on: ubuntu-latest

    steps:
    - name: 📦 Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        persist-credentials: false

    - name: ⚙️ Setup .NET
      uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
      with:
        dotnet-version: '10.0.x'

    - name: 🗂️ Cache Dependencies
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: 📋 Restore Dependencies
      run: dotnet restore

    - name: 🛠️ Restore DocFX Tool
      run: dotnet tool restore

    - name: 📖 Build API Reference Site (validation only)
      run: dotnet docfx docs/apiref/docfx.json --warningsAsErrors

  # Builds the Jekyll conceptual-docs site (owning the root of Pages) and the DocFX API reference
  # (published under /api/), assembles both into a single Pages artifact, and deploys it.
  deploy-docs:
    name: 🚀 Deploy Documentation
    runs-on: ubuntu-latest
    needs: validate-api-reference
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
    - name: 📦 Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        persist-credentials: false

    - name: ⚙️ Setup .NET
      uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
      with:
        dotnet-version: '10.0.x'

    - name: 🗂️ Cache Dependencies
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: 📋 Restore Dependencies
      run: dotnet restore

    - name: 🛠️ Restore DocFX Tool
      run: dotnet tool restore

    - name: 📖 Build API Reference Site
      run: dotnet docfx docs/apiref/docfx.json --warningsAsErrors

    - name: 🏗️ Setup Ruby (for Jekyll)
      uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
      with:
        ruby-version: '3.2'
        bundler-cache: true

    - name: 🧭 Configure Pages
      uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

    - name: 📦 Install Jekyll Dependencies
      run: |
        echo "📦 Using repository Gemfile for Jekyll dependencies..."
        echo "Gemfile contents:"
        cat Gemfile
        bundle install

    - name: 🏗️ Build Jekyll Site
      run: |
        echo "🏗️ Building Jekyll site..."
        bundle exec jekyll build --destination _site

        echo "📋 Jekyll build completed. Contents:"
        ls -la _site/

    # DocFX owns /api/ under the Pages site; Jekyll owns everything else. Jekyll builds first (into
    # _site/), then the already-built DocFX output (docs/apiref/_site/) is copied into _site/api/ so a
    # single upload-pages-artifact step publishes both.
    - name: 🔗 Merge API Reference into Pages Site
      run: |
        echo "🔗 Copying DocFX output into _site/api/..."
        mkdir -p _site/api
        cp -r docs/apiref/_site/. _site/api/
        ls -la _site/api/

    - name: 📤 Upload Documentation Site
      uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
      with:
        path: _site

    - name: 🚀 Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
