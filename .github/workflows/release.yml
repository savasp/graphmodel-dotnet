name: Release

on:
  push:
    tags:
      - "v*"
  # Manual runs are always a dry run: build, test, pack, and attest — but
  # never publish to NuGet or create a GitHub Release. Real publishing only
  # ever happens on an actual `v*` tag push (see the `publish` job's `if`).
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  ContinuousIntegrationBuild: true
  SourceRevisionId: ${{ github.sha }}

jobs:
  resolve-version:
    name: Resolve version from tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      version: ${{ steps.check.outputs.version }}
      is_prerelease: ${{ steps.check.outputs.is_prerelease }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Resolve version
        id: check
        shell: bash
        run: |
          # Releases are tag-authoritative: the tag IS the version, and this
          # workflow only ever reads it. No step here writes or stamps a version
          # — a step that did is what produced the old mangled
          # 1.0.0-alpha.20251014.0.20251014.0 (see docs/release-process.md).
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Dry run: no tag to read, so build at the VERSION file's development
            # default. Deliberately NOT scheme-checked — VERSION is never what
            # ships, and requiring it to look like a real release version is what
            # would force a misleading date into the file.
            VERSION=$(tr -d '[:space:]' < VERSION)
            echo "::notice::Manual dispatch — dry run at the VERSION file's development default ($VERSION). No tag involved."
          else
            VERSION="${GITHUB_REF#refs/tags/v}"

            # scripts/release.sh is the only supported way to cut a tag. Reject
            # anything that doesn't match the scheme it produces, so a hand-made
            # tag cannot publish an off-scheme version to nuget.org — where a
            # published version is immutable and cannot be taken back. Only the
            # tag path is checked: this is the only path that can publish.
            if ! version_error="$(./scripts/validate-release-version.sh "$VERSION" 2>&1)"; then
              echo "::error::Tag 'v$VERSION' is not releasable: $version_error Cut releases with ./scripts/release.sh."
              exit 1
            fi
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if [[ "$VERSION" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: resolve-version
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: "10.0.x"
          cache: false
          cache-dependency-path: |
            **/*.csproj
            global.json

      - name: Restore dependencies
        run: dotnet restore

      - name: Build LocalFeed packages
        run: dotnet build --configuration LocalFeed --no-restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

  test-core:
    name: Test Core
    runs-on: ubuntu-latest
    needs: resolve-version
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: "10.0.x"
          cache: false
          cache-dependency-path: |
            **/*.csproj
            global.json

      - name: Restore dependencies
        run: dotnet restore

      - name: Build LocalFeed packages
        run: dotnet build --configuration LocalFeed --no-restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test Core
        run: dotnet test --project tests/Graph.CompatibilityTests.Tests/Graph.CompatibilityTests.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Test Core Libraries
        run: dotnet test --project tests/Graph.Core.Tests/Graph.Core.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Test Cypher IR
        run: dotnet test --project tests/Graph.Cypher.Tests/Graph.Cypher.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Test Query Surface Compilation
        run: dotnet test --project tests/Graph.QuerySurface.CompilationTests/Graph.QuerySurface.CompilationTests.csproj --no-build --configuration Release --verbosity normal

      - name: Test In-Memory Provider (strict compliance)
        env:
          GRAPHMODEL_COMPLIANCE_STRICT: "1"
        run: dotnet test --project tests/Graph.InMemory.Tests/Graph.InMemory.Tests.csproj --no-build --configuration Release --verbosity normal

  test-analyzers:
    name: Test Analyzers
    runs-on: ubuntu-latest
    needs: resolve-version
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: "10.0.x"
          cache: false
          cache-dependency-path: |
            **/*.csproj
            global.json

      - name: Restore dependencies
        run: dotnet restore

      - name: Build LocalFeed packages
        run: dotnet build --configuration LocalFeed --no-restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test Analyzers
        run: dotnet test --project tests/Graph.Analyzers.Tests/Graph.Analyzers.Tests.csproj --no-build --configuration Release --verbosity normal

  test-translation:
    name: Test LINQ-to-Cypher translation
    runs-on: ubuntu-latest
    needs: resolve-version
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: "10.0.x"
          cache: false
          cache-dependency-path: |
            **/*.csproj
            global.json

      - name: Restore dependencies
        run: dotnet restore

      - name: Build LocalFeed packages
        run: dotnet build --configuration LocalFeed --no-restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test LINQ-to-Cypher translation (no Neo4j required)
        run: dotnet test --project tests/Graph.Neo4j.Translation.Tests/Graph.Neo4j.Translation.Tests.csproj --no-build --configuration Release --verbosity normal

  test-codegen:
    name: Test serialization code generator
    runs-on: ubuntu-latest
    needs: resolve-version
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: "10.0.x"
          cache: false
          cache-dependency-path: |
            **/*.csproj
            global.json

      - name: Restore dependencies
        run: dotnet restore

      - name: Build LocalFeed packages
        run: dotnet build --configuration LocalFeed --no-restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test serialization code generator (no Neo4j required)
        run: dotnet test --project tests/Graph.Serialization.CodeGen.Tests/Graph.Serialization.CodeGen.Tests.csproj --no-build --configuration Release --verbosity normal

  test-neo4j:
    name: Test Neo4j Provider
    runs-on: ubuntu-latest
    needs: resolve-version
    timeout-minutes: 20
    permissions:
      contents: read

    services:
      neo4j:
        image: neo4j:5
        ports:
          - 7687:7687
          - 7474:7474
        env:
          NEO4J_AUTH: neo4j/password
          NEO4J_PLUGINS: '["apoc"]'
          NEO4J_dbms_security_procedures_unrestricted: apoc.*
          NEO4J_dbms_security_procedures_allowlist: apoc.*
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: "10.0.x"
          cache: false
          cache-dependency-path: |
            **/*.csproj
            global.json

      - name: Wait for Neo4j
        shell: bash
        run: |
          timeout 300 bash -c 'until curl --fail --silent http://localhost:7474 >/dev/null; do sleep 5; done'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build LocalFeed packages
        run: dotnet build --configuration LocalFeed --no-restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test Neo4j Provider
        run: dotnet test --project tests/Graph.Neo4j.Tests/Graph.Neo4j.Tests.csproj --no-build --configuration Release --verbosity normal
        env:
          GRAPHMODEL_COMPLIANCE_STRICT: "1"
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: password
          USE_NEO4J_CONTAINERS: false

  test-age:
    name: Test Apache AGE Provider
    runs-on: ubuntu-latest
    needs: resolve-version
    timeout-minutes: 20
    permissions:
      contents: read

    services:
      age:
        image: apache/age:release_PG18_1.7.0
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: "10.0.x"
          cache: false
          cache-dependency-path: |
            **/*.csproj
            global.json

      - name: Restore dependencies
        run: dotnet restore

      - name: Build LocalFeed packages
        run: dotnet build --configuration LocalFeed --no-restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test Apache AGE Provider
        run: dotnet test --project tests/Graph.Age.Tests/Graph.Age.Tests.csproj --no-build --configuration Release --verbosity normal
        env:
          AGE_CONNECTION_STRING: Host=localhost;Port=5432;Username=postgres;Password=postgres;Database=postgres
          GRAPHMODEL_COMPLIANCE_STRICT: "1"

  pack:
    name: Pack
    runs-on: ubuntu-latest
    needs:
      - resolve-version
      - build
      - test-core
      - test-analyzers
      - test-translation
      - test-codegen
      - test-neo4j
      - test-age
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
      attestations: write

    # The version reaches every dotnet invocation in this job — build, pack, and
    # the msbuild evaluation inside verify-package-set.sh — as an environment
    # variable that Directory.Build.props prefers over the VERSION file. Set at
    # job level rather than per step so no packing step can silently fall back to
    # the development default. This is the only job that packs, so it is the only
    # one that needs it.
    env:
      GRAPH_RELEASE_VERSION: ${{ needs.resolve-version.outputs.version }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: "10.0.x"
          cache: false
          cache-dependency-path: |
            **/*.csproj
            global.json

      - name: Restore dependencies
        run: dotnet restore

      - name: Build packages (Release)
        run: |
          dotnet build --configuration Release --no-restore src/Graph/Graph.csproj
          dotnet build --configuration Release --no-restore src/Graph.Cypher/Graph.Cypher.csproj
          dotnet build --configuration Release --no-restore src/Graph.Serialization/Graph.Serialization.csproj
          dotnet build --configuration Release --no-restore src/Graph.Neo4j/Graph.Neo4j.csproj
          dotnet build --configuration Release --no-restore src/Graph.Age/Graph.Age.csproj
          dotnet build --configuration Release --no-restore src/Graph.InMemory/Graph.InMemory.csproj
          dotnet build --configuration Release --no-restore src/Graph.CompatibilityTests/Graph.CompatibilityTests.csproj
          dotnet build --configuration Release --no-restore src/Graph.Analyzers/Graph.Analyzers.csproj
          dotnet build --configuration Release --no-restore src/Graph.Serialization.CodeGen/Graph.Serialization.CodeGen.csproj

      - name: Pack
        run: |
          dotnet pack --configuration Release --no-build -o ./artifacts src/Graph/Graph.csproj
          dotnet pack --configuration Release --no-build -o ./artifacts src/Graph.Cypher/Graph.Cypher.csproj
          dotnet pack --configuration Release --no-build -o ./artifacts src/Graph.Serialization/Graph.Serialization.csproj
          dotnet pack --configuration Release --no-build -o ./artifacts src/Graph.Neo4j/Graph.Neo4j.csproj
          dotnet pack --configuration Release --no-build -o ./artifacts src/Graph.Age/Graph.Age.csproj
          dotnet pack --configuration Release --no-build -o ./artifacts src/Graph.InMemory/Graph.InMemory.csproj
          dotnet pack --configuration Release --no-build -o ./artifacts src/Graph.CompatibilityTests/Graph.CompatibilityTests.csproj
          dotnet pack --configuration Release --no-build -o ./artifacts -p:IsPackable=true src/Graph.Analyzers/Graph.Analyzers.csproj
          dotnet pack --configuration Release --no-build -o ./artifacts -p:IsPackable=true src/Graph.Serialization.CodeGen/Graph.Serialization.CodeGen.csproj

      - name: Verify release package inventory and assembly versions
        run: ./scripts/verify-package-set.sh ./artifacts "${NEEDS_RESOLVE_VERSION_OUTPUTS_VERSION}"
        env:
          NEEDS_RESOLVE_VERSION_OUTPUTS_VERSION: ${{ needs.resolve-version.outputs.version }}

      - name: Verify a clean consumer can restore the release packages
        shell: bash
        run: |
          set -euo pipefail
          rm -rf ./consumer-packages
          dotnet restore examples/SimpleMovieExample/SimpleMovieExample.csproj \
            --force \
            --no-cache \
            --packages ./consumer-packages \
            --source "$PWD/artifacts" \
            --source https://api.nuget.org/v3/index.json \
            -p:Configuration=Release
          dotnet build examples/SimpleMovieExample/SimpleMovieExample.csproj \
            --configuration Release \
            --no-restore \
            -p:RestorePackagesPath="$PWD/consumer-packages"

      - name: Create tagged source archive
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.resolve-version.outputs.version }}
        run: |
          set -euo pipefail
          git archive \
            --format=zip \
            --prefix="cvoya-graph-${RELEASE_VERSION}/" \
            --output=./artifacts/cvoya-graph-source.zip \
            HEAD

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            artifacts/*.nupkg
            artifacts/*.snupkg
            artifacts/cvoya-graph-source.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: packages-${{ needs.resolve-version.outputs.version }}
          path: ./artifacts/
          retention-days: 30

  publish:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    needs:
      - resolve-version
      - pack
    # Real publishing only ever happens on an actual `v*` tag push.
    # workflow_dispatch is a validation/dry-run path only — it always stops
    # here, so there is no route to a real publish without also creating the
    # matching GitHub Release below.
    if: ${{ github.event_name == 'push' }}
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: packages-${{ needs.resolve-version.outputs.version }}
          path: ./artifacts

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: "10.0.x"

      # Trusted Publishing: exchanges a short-lived GitHub OIDC token for a
      # temporary NuGet API key (valid ~1 hour). No long-lived secret involved.
      # Requires a Trusted Publishing policy configured on nuget.org for this
      # repository and workflow — see docs/release-process.md. The nuget.org
      # account/org name is stored as the NUGET_TRUSTED_PUBLISHING_USER
      # repository variable (not a secret — it's just a username).
      - name: NuGet login (OIDC to temporary API key)
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
        id: nuget-login
        with:
          user: ${{ vars.NUGET_TRUSTED_PUBLISHING_USER }}

      - name: Push packages to NuGet
        shell: bash
        run: |
          for pkg in ./artifacts/*.nupkg; do
            echo "Publishing $(basename "$pkg")..."
            dotnet nuget push "$pkg" \
              --api-key "${STEPS_NUGET_LOGIN_OUTPUTS_NUGET_API_KEY}" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done
        env:
          STEPS_NUGET_LOGIN_OUTPUTS_NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - resolve-version
      - pack
      - publish
    if: ${{ github.event_name == 'push' }}
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: packages-${{ needs.resolve-version.outputs.version }}
          path: ./artifacts

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          IS_PRERELEASE: ${{ needs.resolve-version.outputs.is_prerelease }}
          RELEASE_INTRO: |
            <p><a href="https://cvoya.com"><img src="https://raw.githubusercontent.com/cvoya-com/.github/main/profile/cvoya-wordmark.png" alt="CVOYA" width="260"></a></p>

            **CVOYA Graph is downloadable open-source computer software published by [CVOYA](https://cvoya.com).** Download the tagged source archive (`cvoya-graph-source.zip`) below, or install the packages from [NuGet](https://www.nuget.org/profiles/cvoya).

            The current packages use the `Cvoya.Graph.*` IDs and replace the earlier `Cvoya.Graph.Model.*` package line. See the [CVOYA software catalog](https://cvoya.com/software) for the project overview and download links.
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(./artifacts/*.nupkg ./artifacts/*.snupkg ./artifacts/cvoya-graph-source.zip)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "::error::No release packages were downloaded."
            exit 1
          fi

          # Keep job re-runs green: if the release already exists (e.g. a
          # retried run), refresh its assets instead of failing on create.
          if gh release view "$GITHUB_REF_NAME" --json name >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists; re-uploading assets."
            gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber
          else
            args=(release create "$GITHUB_REF_NAME" "${files[@]}" --title "CVOYA Graph $GITHUB_REF_NAME" --generate-notes --notes "$RELEASE_INTRO")
            if [[ "$IS_PRERELEASE" == "true" ]]; then
              args+=(--prerelease)
            fi
            gh "${args[@]}"
          fi
