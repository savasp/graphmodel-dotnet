name: CodeQL Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  ContinuousIntegrationBuild: true
  SourceRevisionId: ${{ github.sha }}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
      pull-requests: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
            query-suite: codeql/actions-queries:codeql-suites/actions-security-and-quality.qls
          - language: csharp
            build-mode: manual
            query-suite: codeql/csharp-queries:codeql-suites/csharp-security-and-quality.qls
          - language: ruby
            build-mode: none
            query-suite: codeql/ruby-queries:codeql-suites/ruby-security-and-quality.qls

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: |
            **/*.csproj
            Directory.Packages.props
            global.json

      - name: Restore dependencies
        if: matrix.language == 'csharp'
        run: dotnet restore

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: ${{ matrix.query-suite }}

      - name: Set up local feed
        if: matrix.language == 'csharp'
        run: dotnet build --configuration LocalFeed --no-restore

      - name: Build
        if: matrix.language == 'csharp'
        run: dotnet build --configuration Release --no-restore

      - name: Perform CodeQL Analysis
        id: analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
          output: codeql-results

      - name: Enforce CodeQL warning threshold
        shell: bash
        env:
          SARIF_DIRECTORY: ${{ steps.analyze.outputs.sarif-output }}
        run: |
          mapfile -t sarif_files < <(find "$SARIF_DIRECTORY" -type f -name '*.sarif' -print)
          if [[ ${#sarif_files[@]} -eq 0 ]]; then
            echo "::error::CodeQL did not produce a SARIF file in $SARIF_DIRECTORY"
            exit 1
          fi

          alert_count=$(jq -s '[
            .[]
            | .runs[] as $run
            | $run.results[]? as $result
            | ($result.level
                // ([
                  ($run.tool.driver.rules[]?),
                  ($run.tool.extensions[]?.rules[]?)
                  | select(.id == $result.ruleId)
                  | .defaultConfiguration.level
                ][0])
                // "warning") as $level
            | select($level == "error" or $level == "warning")
          ] | length' "${sarif_files[@]}")

          if [[ "$alert_count" -gt 0 ]]; then
            echo "::error::CodeQL found $alert_count error/warning alert(s)."
            exit 1
          fi

          echo "CodeQL found no error/warning alerts."
