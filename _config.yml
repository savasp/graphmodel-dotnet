# CVOYA graph Documentation Site Configuration

title: CVOYA graph Documentation
description: A powerful, type-safe .NET library ecosystem for working with graph data structures and graph databases.
baseurl: "/graph"
url: "https://oss.cvoya.com"

# Build settings
markdown: kramdown
highlighter: rouge
theme: minima

# GitHub Pages settings
repository: cvoya-com/graph

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  # Rewrites relative .md links between rendered pages to their .html URLs.
  - jekyll-relative-links

# Render conceptual Markdown consistently without repeating layout metadata.
defaults:
  - scope:
      path: "docs"
    values:
      layout: page

# Exclude from processing
exclude:
  - src/
  - tests/
  - examples/
  - scripts/
  - obj/
  - bin/
  - local-nuget-feed/
  - artifacts/
  - docs/apiref/
  - "*.sln"
  - "*.csproj"
  - "*.cs"
  - Directory.Build.props
  - VERSION
  - LICENSE
  - SECURITY.md
  - CHANGELOG.md
  - CONTRIBUTING.md
  - developer/
  - codecov.yml

# Kramdown settings
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
